name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend — lint & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint (syntax check)
        run: python -m compileall backend/app notebooks

      - name: Run test suite
        working-directory: backend
        run: pytest tests/ -v

  frontend-build:
    name: Frontend — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Production build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # Continuous deployment stage.
  # Enable by adding the platform's secrets (e.g. RENDER_DEPLOY_HOOK or
  # VERCEL_TOKEN) in the repo settings, then uncomment the deploy step.
  deploy:
    name: Deploy (main only)
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deployment gate passed
        run: echo "All checks green - ready to deploy."
      # - name: Trigger Render deploy
      #   run: curl -sf "${{ secrets.RENDER_DEPLOY_HOOK }}"
